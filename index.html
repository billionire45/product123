<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-5885203883948587">
  <title id="site-title">인공지능 동물상 테스트</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5885203883948587"
     crossorigin="anonymous"></script>
  <link href='style.css' rel='stylesheet'>
</head>
<body>
  <div class="controls">
    <div class="lang-buttons">
      <button onclick="changeLanguage('ko')">한국어</button>
      <button onclick="changeLanguage('en')">English</button>
      <button onclick="changeLanguage('ja')">日本語</button>
    </div>
    <button id="theme-toggle">Dark Mode</button>
  </div>

  <main>
    <h1 id="main-heading">나의 동물상은?</h1>
    <p id="sub-heading">강아지상일까, 고양이상일까? AI가 분석해드립니다!</p>
    
    <div class="test-container">
      <div id="image-container">
        <img id="face-image" src="" alt="your image" style="display: none; max-width: 100%; border-radius: 10px; margin-bottom: 20px;">
      </div>
      <div id="label-container"></div>
      <div class="upload-area">
        <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)" style="display: none;">
        <button type="button" id="upload-btn" onclick="document.getElementById('image-upload').click()">사진 업로드하기</button>
      </div>
    </div>

    <section id="contact-section">
      <h2 id="contact-heading">제휴 문의</h2>
      <form action="https://formspree.io/f/xeerynll" method="POST" id="contact-form">
        <div class="form-group">
          <label for="email" id="label-email">이메일 주소</label>
          <input type="email" name="email" id="email" required placeholder="example@mail.com">
        </div>
        <div class="form-group">
          <label for="message" id="label-message">문의 내용</label>
          <textarea name="message" id="message" required placeholder="문의 내용을 입력해주세요."></textarea>
        </div>
        <button type="submit" id="submit-btn">보내기</button>
      </form>
    </section>

    <section id="comments-section">
      <div id="disqus_thread"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script defer type="text/javascript" src="main.js"></script>
  <script>
      (function() { 
      var d = document, s = d.createElement('script');
      s.src = 'https://https-product123-c38-pages-dev.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
      })();
  </script>
</body>
</html>
