<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="site-title">저녁 메뉴 추천</title>
  <link href='style.css' rel='stylesheet'>
</head>
<body>
  <div class="controls">
    <div class="lang-buttons">
      <button onclick="changeLanguage('ko')">한국어</button>
      <button onclick="changeLanguage('en')">English</button>
      <button onclick="changeLanguage('ja')">日本語</button>
    </div>
    <button id="theme-toggle">Dark Mode</button>
  </div>

  <main>
    <h1 id="main-heading">오늘 저녁 뭐 먹지?</h1>
    <div id="menu-card" class="card">
      <img id="menu-image" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=400" alt="food">
      <h2 id="menu-name">메뉴를 추천해드릴게요!</h2>
    </div>
    <button id="recommend-btn" onclick="recommendMenu()">메뉴 추천받기</button>

    <section id="contact-section">
      <h2 id="contact-heading">제휴 문의</h2>
      <form action="https://formspree.io/f/xeerynll" method="POST" id="contact-form">
        <div class="form-group">
          <label for="email" id="label-email">이메일 주소</label>
          <input type="email" name="email" id="email" required placeholder="example@mail.com">
        </div>
        <div class="form-group">
          <label for="message" id="label-message">문의 내용</label>
          <textarea name="message" id="message" required placeholder="문의 내용을 입력해주세요."></textarea>
        </div>
        <button type="submit" id="submit-btn">보내기</button>
      </form>
    </section>

    <section id="comments-section" style="margin-top: 50px; width: 100%; max-width: 800px; background-color: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
      <div id="disqus_thread"></div>
      <script>
          (function() { 
          var d = document, s = d.createElement('script');
          s.src = 'https://https-product123-c38-pages-dev.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </section>
  </main>

  <script defer type="text/javascript" src="main.js"></script>
</body>
</html>
